<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>mvadel</title>

  <style>
    body {
      margin: 0;
      background: #0d1117;
      color: #e6edf3;
      font-family: monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .box {
      background: #161b22;
      border: 1px solid #30363d;
      padding: 25px;
      border-radius: 12px;
      width: 400px;
      text-align: center;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    h1 {
      margin-bottom: 10px;
      font-size: 22px;
      color: #58a6ff;
    }

    #content {
      white-space: pre-wrap;
      margin: 15px 0;
      color: #c9d1d9;
    }

    #timer {
      margin: 10px 0;
      color: #8b949e;
    }

    button {
      margin-top: 15px;
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      background: #238636;
      color: white;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover {
      background: #2ea043;
    }

    #status {
      margin-top: 15px;
      font-style: italic;
      color: #d29922;
    }

    #visits {
      margin-top: 10px;
      font-size: 12px;
      color: #6e7681;
    }
  </style>
</head>

<body>

  <div class="box">
    <h1>mvadel.com</h1>

    <div id="content">Loading...</div>

    <div id="timer">Initializing timer...</div>

    <button onclick="sendRequest()">Send Request</button>

    <div id="status"></div>

    <div id="visits"></div>
  </div>

  <script>
    // Load hey.txt
    fetch('hey.txt')
      .then(res => res.text())
      .then(text => {
        document.getElementById('content').innerText = text;
      })
      .catch(() => {
        document.getElementById('content').innerText = "could not load hey.txt";
      });

    // Timer
    let start = Date.now();
    setInterval(() => {
      let seconds = Math.floor((Date.now() - start) / 1000);
      document.getElementById('timer').innerText =
        "Session time: " + seconds + "s";
    }, 1000);

    // Fake request system
    const messages = [
      "Processing request...",
      "Checking server mood...",
      "Request sent to nowhere...",
      "Thinking...",
      "Reconsidering your life choices..."
    ];

    const results = [
      "Request accepted ✅",
      "Denied ❌",
      "Server confused 🤔",
      "Try again later ⏳",
      "Approved... but why?"
    ];

    function sendRequest() {
      let status = document.getElementById('status');

      let msg = messages[Math.floor(Math.random() * messages.length)];
      status.innerText = msg;

      setTimeout(() => {
        let res = results[Math.floor(Math.random() * results.length)];
        status.innerText = res;
      }, 2000);
    }

    // Local visit counter
    let visits = localStorage.getItem('visits') || 0;
    visits++;
    localStorage.setItem('visits', visits);

    document.getElementById('visits').innerText =
      "You visited this page " + visits + " times (locally)";
  </script>

</body>
</html>
